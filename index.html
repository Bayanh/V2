<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Nghe Nhạc Offline</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --primary: #fa243c; 
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --border-color: #e5e5ea;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 140px; 
        }

        header { background-color: var(--card-bg); padding: 20px 20px 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 0 rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 28px; font-weight: 700; transition: 0.3s; }
        .profile-pic { width: 36px; height: 36px; background-color: #ccc; background-image: url('https://ui-avatars.com/api/?name=B&background=random'); background-size: cover; border-radius: 50%; }
        
        .container { padding: 15px; display: none; }
        .container.active { display: block; }
        .section-title { font-size: 18px; font-weight: 700; margin: 10px 0 15px 5px; }

        /* Màn hình Upload */
        .upload-screen { background-color: var(--card-bg); border-radius: 16px; padding: 40px 20px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-top: 20px; }
        .upload-icon { font-size: 60px; margin-bottom: 15px; }
        .upload-screen h3 { margin: 0 0 10px 0; font-size: 20px; }
        .upload-screen p { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .upload-btn { background-color: var(--primary); color: white; padding: 14px 24px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 10px rgba(250, 36, 60, 0.3); transition: transform 0.1s; display: inline-block; }
        .upload-btn:active { transform: scale(0.97); }

        /* Danh sách nhạc */
        .list-container { background-color: var(--card-bg); border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); min-height: 100px; }
        .list-item { padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px; cursor: pointer; transition: background-color 0.2s; }
        .list-item:active { background-color: #f0f0f5; }
        .list-item:last-child { border-bottom: none; }
        .list-item.playing { background-color: #fff0f2; } /* Hiệu ứng bài đang phát */

        .track-art { width: 50px; height: 50px; background-color: #e5e5ea; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; background-size: cover; background-position: center; flex-shrink: 0;}
        .item-info { flex: 1; overflow: hidden;}
        .item-info h4 { margin: 0 0 4px 0; font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .item-info p { margin: 0; font-size: 13px; color: var(--text-muted); }
        
        .action-btns { display: flex; gap: 5px; }
        .icon-btn { font-size: 20px; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .icon-btn:active { background-color: #ffe5e5; }

        /* Mini Player & Thanh Tua Nhạc */
        .mini-player { position: fixed; bottom: 75px; left: 10px; right: 10px; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); padding: 10px 15px; border-radius: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 15px; z-index: 99; }
        .mini-art { width: 45px; height: 45px; background-color: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; background-size: cover; background-position: center; flex-shrink: 0;}
        .mini-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; justify-content: center;}
        .mini-info h4 { margin: 0 0 2px 0; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Giao diện thanh tua */
        .seek-container { display: flex; align-items: center; gap: 8px; margin-top: 4px;}
        .seek-bar { flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px; background: #e5e5ea; outline: none; }
        .seek-bar::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--primary); cursor: pointer; }
        .time-display { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; min-width: 32px;}
        
        .mini-controls { font-size: 28px; cursor: pointer; color: var(--primary); }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0 25px 0; border-top: 1px solid var(--border-color); z-index: 98; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }
        
        .empty-msg { padding: 30px 20px; text-align: center; color: var(--text-muted); font-size: 15px; line-height: 1.6;}
    </style>
</head>
<body>

    <header>
        <h1 id="header-title">Trang chủ</h1>
        <div class="profile-pic"></div>
    </header>

    <!-- TRANG CHỦ -->
    <div id="tab-home" class="container active">
        <div class="section-title">Nhạc của tôi</div>
        <div class="list-container" id="song-list">
            <!-- Load bài hát vào đây -->
        </div>
    </div>

    <!-- THÊM NHẠC -->
    <div id="tab-add" class="container">
        <div class="upload-screen">
            <div class="upload-icon">🎵</div>
            <h3>Thêm bài hát mới</h3>
            <p>Tải tệp âm thanh để phát ngoại tuyến.</p>
            <div class="upload-btn" onclick="document.getElementById('file-upload').click()">
                ➕ Chọn file nhạc
            </div>
            <input type="file" id="file-upload" accept=".mp3, .m4a, .wav, .flac, audio/*" style="display: none;">
        </div>
    </div>

    <!-- Input ẩn để tải ảnh Cover -->
    <input type="file" id="cover-upload" accept="image/*" style="display: none;">

    <audio id="audio-element"></audio>

    <!-- MINI PLAYER CÓ THANH TUA -->
    <div class="mini-player">
        <div class="mini-art" id="current-art">🎵</div>
        <div class="mini-info">
            <h4 id="current-title">Chưa phát nhạc</h4>
            <div class="seek-container">
                <span id="current-time" class="time-display">0:00</span>
                <input type="range" id="seek-bar" class="seek-bar" value="0" step="1">
                <span id="total-time" class="time-display">0:00</span>
            </div>
        </div>
        <div class="mini-controls" onclick="togglePlay()" id="play-pause-btn">▶️</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-btn-home" onclick="switchTab('home')">
            <span class="nav-icon">🏠</span><span>Trang chủ</span>
        </div>
        <div class="nav-item" id="nav-btn-add" onclick="switchTab('add')">
            <span class="nav-icon">➕</span><span>Thêm nhạc</span>
        </div>
    </div>

    <script>
        // --- CHUYỂN TRANG ---
        function switchTab(tab) {
            document.getElementById('tab-home').classList.toggle('active', tab === 'home');
            document.getElementById('tab-add').classList.toggle('active', tab === 'add');
            document.getElementById('nav-btn-home').classList.toggle('active', tab === 'home');
            document.getElementById('nav-btn-add').classList.toggle('active', tab === 'add');
            document.getElementById('header-title').innerText = tab === 'home' ? 'Trang chủ' : 'Thêm nhạc';
        }

        // --- CƠ SỞ DỮ LIỆU & BIẾN TOÀN CỤC ---
        let db;
        let globalSongs = []; // Lưu mảng bài hát để làm tính năng tự động phát
        let currentPlayingId = null; // Theo dõi bài nào đang phát
        let isPlaying = false;
        
        const request = indexedDB.open("MusicAppDB_V2", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
        };
        request.onsuccess = (e) => { db = e.target.result; loadSongsFromDB(); };

        // --- UPLOAD NHẠC ---
        document.getElementById('file-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const fileName = file.name.replace(/\.[^/.]+$/, ""); 
                const newSong = { title: fileName, audioData: file, coverData: null };
                
                const tx = db.transaction(["songs"], "readwrite");
                tx.objectStore("songs").add(newSong).onsuccess = () => {
                    this.value = ''; alert("Đã lưu bài hát!");
                    loadSongsFromDB(); switchTab('home');
                };
            }
        });

        // --- RENDER DANH SÁCH NHẠC ---
        const songList = document.getElementById('song-list');
        function loadSongsFromDB() {
            db.transaction(["songs"], "readonly").objectStore("songs").getAll().onsuccess = (e) => {
                globalSongs = e.target.result.reverse(); // Mới nhất lên đầu
                songList.innerHTML = ''; 

                if (globalSongs.length === 0) {
                    songList.innerHTML = '<div class="empty-msg">Chưa có bài hát nào.<br>Hãy sang tab <b>Thêm nhạc</b> để tải lên nhé!</div>';
                    return;
                }

                globalSongs.forEach(song => {
                    const newItem = document.createElement('div');
                    newItem.className = `list-item ${song.id === currentPlayingId ? 'playing' : ''}`;
                    newItem.id = `song-item-${song.id}`;
                    
                    // Tạo ảnh bìa (Nếu có ảnh tự up thì dùng, không thì dùng emoji mặc định)
                    let bgStyle = '';
                    let innerContent = '🎧';
                    if (song.coverData) {
                        const imgUrl = URL.createObjectURL(song.coverData);
                        bgStyle = `background-image: url('${imgUrl}');`;
                        innerContent = '';
                    }

                    newItem.innerHTML = `
                        <div class="track-art" style="${bgStyle}">${innerContent}</div>
                        <div class="item-info">
                            <h4>${song.title}</h4>
                            <p>Nhạc ngoại tuyến</p>
                        </div>
                        <div class="action-btns">
                            <div class="icon-btn" onclick="triggerCoverUpload(${song.id}, event)">🖼️</div>
                            <div class="icon-btn" style="color: #ff3b30;" onclick="deleteSong(${song.id}, event)">🗑️</div>
                        </div>
                    `;

                    newItem.onclick = () => playSong(song.id);
                    songList.appendChild(newItem);
                });
            };
        }

        // --- ĐỔI ẢNH BÌA ---
        let editingSongId = null;
        const coverUpload = document.getElementById('cover-upload');
        
        function triggerCoverUpload(id, event) {
            event.stopPropagation(); // Không phát nhạc khi bấm nút
            editingSongId = id;
            coverUpload.click();
        }

        coverUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && editingSongId) {
                const tx = db.transaction(["songs"], "readwrite");
                const store = tx.objectStore("songs");
                
                store.get(editingSongId).onsuccess = (req) => {
                    let song = req.target.result;
                    song.coverData = file; // Lưu file ảnh vào DB
                    
                    store.put(song).onsuccess = () => {
                        this.value = ''; // Reset input
                        loadSongsFromDB(); // Cập nhật lại danh sách
                        
                        // Nếu bài vừa đổi ảnh đang phát thì update luôn Mini Player
                        if(currentPlayingId === editingSongId) {
                            const imgUrl = URL.createObjectURL(file);
                            document.getElementById('current-art').style.backgroundImage = `url('${imgUrl}')`;
                            document.getElementById('current-art').innerText = '';
                        }
                    };
                };
            }
        });

        // --- XÓA NHẠC ---
        function deleteSong(id, event) {
            event.stopPropagation();
            if(confirm("Xóa bài hát này?")) {
                db.transaction(["songs"], "readwrite").objectStore("songs").delete(id).onsuccess = () => {
                    if (currentPlayingId === id) { audioElement.pause(); isPlaying = false; }
                    loadSongsFromDB(); 
                };
            }
        }

        // --- TRÌNH PHÁT NHẠC & TỰ ĐỘNG PHÁT ---
        const audioElement = document.getElementById('audio-element');
        const playPauseBtn = document.getElementById('play-pause-btn');

        function playSong(id) {
            const songIndex = globalSongs.findIndex(s => s.id === id);
            if (songIndex === -1) return;
            
            const song = globalSongs[songIndex];
            currentPlayingId = song.id;

            // Xử lý Audio
            audioElement.src = URL.createObjectURL(song.audioData);
            audioElement.play();
            isPlaying = true;
            playPauseBtn.innerText = '⏸️'; 

            // Cập nhật giao diện Mini Player
            document.getElementById('current-title').innerText = song.title;
            
            const miniArt = document.getElementById('current-art');
            if (song.coverData) {
                miniArt.style.backgroundImage = `url('${URL.createObjectURL(song.coverData)}')`;
                miniArt.innerText = '';
            } else {
                miniArt.style.backgroundImage = 'none';
                miniArt.innerText = '🎵';
            }

            // Đổi màu bài đang phát
            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('playing'));
            document.getElementById(`song-item-${song.id}`).classList.add('playing');
        }

        function togglePlay() {
            if (!audioElement.src) return alert("Chọn bài hát trước!");
            isPlaying ? audioElement.pause() : audioElement.play();
            isPlaying = !isPlaying;
            playPauseBtn.innerText = isPlaying ? '⏸️' : '▶️';
        }

        // TỰ ĐỘNG CHUYỂN BÀI KHI HẾT
        audioElement.onended = () => {
            const currentIndex = globalSongs.findIndex(s => s.id === currentPlayingId);
            if (globalSongs.length > 0) {
                // Lấy bài tiếp theo. Nếu là bài cuối cùng thì vòng lại bài đầu (index 0)
                let nextIndex = currentIndex + 1;
                if (nextIndex >= globalSongs.length) nextIndex = 0; 
                
                playSong(globalSongs[nextIndex].id);
            }
        };

        // --- LOGIC THANH TUA (SEEK BAR) ---
        const seekBar = document.getElementById('seek-bar');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');

        // Hàm format thời gian (giây -> phút:giây)
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' + sec : sec}`;
        }

        // Khi load xong nhạc -> cập nhật thời lượng tối đa
        audioElement.addEventListener('loadedmetadata', () => {
            seekBar.max = audioElement.duration;
            totalTimeEl.innerText = formatTime(audioElement.duration);
        });

        // Khi nhạc đang chạy -> thanh trượt chạy theo
        audioElement.addEventListener('timeupdate', () => {
            seekBar.value = audioElement.currentTime;
            currentTimeEl.innerText = formatTime(audioElement.currentTime);
        });

        // Khi người dùng kéo thanh tua -> đổi thời gian nhạc
        seekBar.addEventListener('input', () => {
            audioElement.currentTime = seekBar.value;
        });

    </script>
</body>
</html>
